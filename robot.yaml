manipulators:
  moveit:
    enable: true
    ros_parameters:
      move_group:
        trajectory_execution:
          allowed_goal_duration_margin: 6.0 # allows slow gripper opening/closing
  arms:
    - model: universal_robots
      parent: top_plate_front_mount
      xyz: [-0.12, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ur_type: ur5
      robot_ip: 192.168.131.40
      headless_mode: true
      kinematics_parameters_file: "/home/robot/ur5_a200_0553_calibration.yaml" # "$(find ur_description)/config/ur5/default_kinematics.yaml"
      poses:
        - name: packed
          joints: [-0.0002396742450159195, -1.5707839171039026, 1.570831298828125, -1.5707123915301722, -1.570864502583639, -0.00022727647890263825]
        - name: forwards
          joints: [-0.0002396742450159195, -1.5707839171039026, 1.570831298828125, -1.5707123915301722, -1.570864502583639, -0.00022727647890263825]
      ros_parameters:
        controller_manager:
          update_rate: 125 # CB3 RTDE max = 125 Hz; Clearpath-Default 500 -> FATAL
          io_and_status_controller:
            type: ur_controllers/GPIOController
        io_and_status_controller:
          tf_prefix: arm_0_
sensors:
  camera:
    - model: intel_realsense
      urdf_enabled: true
      launch_enabled: true
      parent: rg6_onrobot_rg6_base_link
      xyz: [0.023, 0.0, 0.125]
      rpy: [0.0, -1.5708, -3.14]
      ros_parameters:
        intel_realsense:
          camera_name: camera_0
          device_type: d435
          serial_no: "011422072138"
          enable_color: true
          rgb_camera.color_profile: 640,480,30
          enable_depth: true
          depth_module.depth_profile: 640,480,15
          pointcloud.enable: true
  gps: []
  imu:
    - model: redshift_um7
      urdf_enabled: true
      launch_enabled: true
      parent: base_link
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        um7_driver:
          port: /dev/clearpath/um7_
          frame_id: imu_0_link
          tf_ned_to_enu: true
