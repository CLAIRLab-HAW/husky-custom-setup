serial_number: a200-0553
version: 0
system:
  username: robot
  hosts:
    - hostname: cpr-a200-0553
      ip: 192.168.131.10
  ros2:
    namespace: a200_0553
    middleware:
      implementation: rmw_zenoh_cpp # alternative: rmw_fastrtps_cpp
    workspaces:
      - /home/robot/onrobot-rg6/install/setup.bash # path to custom WS
platform:
  mcu:
    protocol: proton
  enable_ekf: true
  enable_foxglove_bridge: true
  wireless:
    enable_wireless_watcher: true
  controller: logitech
  extras:
    urdf:
      path: /home/robot/onrobot-rg6/src/rg6_description/urdf/clearpath_extras.urdf.xacro
    ros_parameters:
      joy_node:
        dev: /dev/input/js0 # needed due to custom BT receiver
      controller_manager:
        update_rate: 10 # mcu is slow so we give more time
        # cycle_time_error_threshold: 0.1
  battery:
    model: HE2411
    configuration: S1P4
  drivetrain:
    control: diff_4wd
    wheels:
      front: indoor
      rear: indoor
  attachments:
    - name: front_bumper
      type: a200.bumper
      model: default
      parent: front_bumper_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      enabled: true
      extension: 0.0
    - name: rear_bumper
      type: a200.bumper
      model: default
      parent: rear_bumper_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      enabled: true
      extension: 0.0
    - name: top_plate
      type: a200.top_plate
      model: large
      parent: default_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      enabled: true
